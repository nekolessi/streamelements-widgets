name: Changesets Version PR
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Detect pending changesets
        id: detect_changesets
        shell: bash
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          if [ ${#files[@]} -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Version PR
        if: steps.detect_changesets.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm dlx @changesets/cli version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # If org policy blocks GITHUB_TOKEN PRs, replace with a PAT secret:
          # GITHUB_TOKEN: ${{ secrets.CHANGESET_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No pending changesets
        if: steps.detect_changesets.outputs.has_changesets != 'true'
        run: echo "No pending changesets found."
